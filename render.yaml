services:
  # Backend Web Service (Docker)
  - type: web
    name: campus-insight-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set this in Render Dashboard
      - key: BACKEND_BASE_URL
        sync: false # Set this to your Render URL after first deploy
      - key: CORS_ORIGINS
        value: "*"
