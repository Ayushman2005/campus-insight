services:
  # Backend Web Service (Native Python)
  - type: web
    name: campus-insight-backend
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set this in Render Dashboard
      - key: BACKEND_BASE_URL
        sync: false # Set this to your Render URL after first deploy
      - key: CORS_ORIGINS
        value: "*"
