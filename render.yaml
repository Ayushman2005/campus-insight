services:
  # Backend Web Service (Native Python)
  - type: web
    name: campus-insight-backend
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && python app.py
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set this in Render Dashboard
      - key: BACKEND_BASE_URL
        sync: false # Set this to your Render URL after first deploy
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: 3.11.10
